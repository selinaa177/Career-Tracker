</head>

const DIMS_ORDER=['数据技能','业务分析','分析表达','英语能力','业务知识','效率工具','求职准备'];
const PHASES=[
{n:1,time:'第1个月',color:'var(--accent)',title:'打基础 · 盘资产 · 恢复英语',sub:'SQL+英语双线并行，同时把5年经历转化成案例',items:['SQL基础到进阶（每天1小时）','英语恢复启动（每天30分钟：读15分+听说15分）','整理3个可量化工作案例（STAR格式）','Excel补Power Query','（可选）启动翻译副业接单']},
{n:2,time:'第2个月',color:'var(--amber)',title:'建技能 · 做项目',sub:'Python入门并产出第一个完整分析项目',items:['Python/pandas入门（每天1小时）','完成第一个数据分析项目','KPI体系+数据分析模型学习','跨境电商平台基础了解','英语持续（每天30分钟）']},
{n:3,time:'第3个月',color:'var(--blue)',title:'投简历 · 强表达',sub:'简历完成，开始投递，强化汇报能力',items:['简历初稿完成（多版本）','BOSS直聘/猎聘开始投递','PPT数据报告制作（面试材料）','英语商务写作+模拟面试','外贸/PMO并行入门']},
{n:4,time:'第4个月',color:'var(--purple)',title:'面试 · 谈offer',sub:'全力应对面试和薪资谈判',items:['20个常见面试问题准备','2-3次模拟面试并复盘','薪资谈判（目标10-15K）','评估offer的成长空间']}
];

let checked={},logs=[],loaded=false,activeFilter='all',expanded={};

async function loadState(){try{const r1=localStorage.getItem('ct_checked_v3');const r2=localStorage.getItem('ct_logs_v3');if(r1)checked=JSON.parse(r1);if(r2)logs=JSON.parse(r2)}catch(e){}loaded=true;setSyncBadge('本地存储');renderAll()}
async function saveChecked(){try{localStorage.setItem('ct_checked_v3',JSON.stringify(checked));setSyncBadge('已保存')}catch(e){setSyncBadge('保存失败')}}
async function saveLogs(){try{localStorage.setItem('ct_logs_v3',JSON.stringify(logs));setSyncBadge('已保存')}catch(e){setSyncBadge('保存失败')}}
function setSyncBadge(t){const e=document.getElementById('syncBadge');if(e)e.textContent=t}
function getProgress(s){const t=s.groups.flatMap(g=>g.tasks);const d=t.filter(t=>checked[t.id]).length;return{done:d,total:t.length,pct:t.length?Math.round(d/t.length*100):0}}
function getTotals(){let d=0,t=0;S.forEach(s=>{const p=getProgress(s);d+=p.done;t+=p.total});return{done:d,total:t,pct:t?Math.round(d/t*100):0}}
function getTotalMins(){return logs.reduce((a,l)=>a+(parseInt(l.mins)||0),0)}
function dimColor(d){const m={'数据技能':'var(--accent)','业务分析':'var(--amber)','分析表达':'var(--blue)','英语能力':'var(--purple)','业务知识':'var(--text2)','效率工具':'var(--blue)','求职准备':'var(--red)'};return m[d]||'var(--text2)'}
function dotColor(p){if(p==='red')return'var(--red)';if(p==='amber')return'var(--amber)';if(p==='blue')return'var(--blue)';return'var(--text3)'}
function skillMap(){const m={};S.forEach(s=>m[s.id]=s.name);return m}

function renderAll(){updateHeader();renderOverview();renderSkills();renderTimeline();renderLogSkillSelect();renderLog()}
function updateHeader(){const t=getTotals();document.getElementById('hPct').textContent=t.pct+'%';document.getElementById('hDone').textContent=t.done;document.getElementById('hTotal').textContent=t.total;document.getElementById('hHours').textContent=Math.round(getTotalMins()/60);document.getElementById('hLogs').textContent=logs.length;document.getElementById('hBar').style.width=t.pct+'%'}

function renderOverview(){const t=getTotals();const m=getTotalMins();document.getElementById('oStats').innerHTML=`<div class="ostat"><div class="ostat-label">总体完成</div><div class="ostat-val">${t.pct}<span class="unit">%</span></div></div><div class="ostat"><div class="ostat-label">任务完成</div><div class="ostat-val">${t.done}<span class="unit"> / ${t.total}</span></div></div><div class="ostat"><div class="ostat-label">累计学习</div><div class="ostat-val">${Math.round(m/60)}<span class="unit"> h</span></div></div><div class="ostat"><div class="ostat-label">学习记录</div><div class="ostat-val">${logs.length}<span class="unit"> 条</span></div></div>`;
const dd={};DIMS_ORDER.forEach(d=>dd[d]={done:0,total:0,skills:[]});S.forEach(s=>{if(!dd[s.dim])dd[s.dim]={done:0,total:0,skills:[]};const p=getProgress(s);dd[s.dim].done+=p.done;dd[s.dim].total+=p.total;dd[s.dim].skills.push(s)});
document.getElementById('oDims').innerHTML=DIMS_ORDER.map(dim=>{const d=dd[dim];if(!d||!d.skills.length)return'';return`<div class="dim-section"><div class="dim-label">${dim}</div>${d.skills.map(s=>{const sp=getProgress(s);return`<div class="dim-row" onclick="switchTab('skills');setFilter('${s.dim}');setTimeout(()=>toggleExpand('${s.id}'),100)"><div class="dim-name">${s.name}</div><div class="dim-bar"><div class="dim-bar-fill" style="width:${sp.pct}%;background:${dimColor(dim)}"></div></div><div class="dim-pct">${sp.pct}%</div></div>`}).join('')}</div>`}).join('')}

function renderFilters(){const dims=['all',...DIMS_ORDER];const labels={all:'全部'};document.getElementById('filterRow').innerHTML=dims.map(d=>`<button class="filter-btn ${activeFilter===d?'active':''}" onclick="setFilter('${d}')">${labels[d]||d}</button>`).join('')}
function setFilter(f){activeFilter=f;renderFilters();renderSkillList()}
function renderSkills(){renderFilters();renderSkillList()}
function renderSkillList(){const filtered=activeFilter==='all'?S:S.filter(s=>s.dim===activeFilter);document.getElementById('skillsList').innerHTML=filtered.map(skill=>{const p=getProgress(skill);const isOpen=expanded[skill.id];return`<div class="skill-card"><div class="skill-header" onclick="toggleExpand('${skill.id}')"><div class="skill-dot" style="background:${dotColor(skill.priority)}"></div><div class="skill-info"><div class="skill-name">${skill.name}</div><div class="skill-meta"><span class="skill-prog-text">${p.done}/${p.total} · ${p.pct}%</span><span class="skill-badge ${skill.badge}">${skill.priorityLabel}</span></div></div><div class="skill-chevron ${isOpen?'open':''}">▼</div></div><div class="skill-prog-bar"><div class="skill-prog-fill" style="width:${p.pct}%;background:${dotColor(skill.priority)}"></div></div><div class="skill-body ${isOpen?'open':''}"><div class="skill-desc">${skill.desc}</div><div class="skill-covers">覆盖方向：${skill.covers.map(c=>`<span class="cover-tag">${c}</span>`).join('')}</div>${skill.groups.map(g=>`<div class="task-group"><div class="task-group-label">${g.label}</div>${g.tasks.map(t=>`<div class="task-item"><div class="task-cb ${checked[t.id]?'checked':''}" onclick="toggleTask('${t.id}')"></div><div class="task-text-wrap"><div class="task-text ${checked[t.id]?'done':''}">${t.text}</div>${t.hint?`<div class="task-hint">${t.hint}</div>`:''}</div></div>`).join('')}</div>`).join('')}</div></div>`}).join('')}
function toggleExpand(id){expanded[id]=!expanded[id];renderSkillList()}
function toggleTask(id){checked[id]=!checked[id];saveChecked();updateHeader();renderSkillList();renderOverview()}

function renderTimeline(){document.getElementById('view-timeline').innerHTML=PHASES.map(p=>`<div class="phase-card phase-${p.n}"><div class="phase-time">${p.time}</div><div class="phase-title">${p.title}</div><div class="phase-sub">${p.sub}</div><ul class="phase-items">${p.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`).join('')}
function renderLogSkillSelect(){const sel=document.getElementById('logSkill');if(!sel)return;sel.innerHTML=`<option value="">选择技能...</option>`+S.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}
function addLog(){const text=document.getElementById('logText').value.trim();if(!text)return;const skill=document.getElementById('logSkill').value;const mins=parseInt(document.getElementById('logMins').value)||0;const now=new Date();logs.unshift({date:now.toLocaleDateString('zh-CN',{month:'numeric',day:'numeric',weekday:'short'}),text,skill,mins,ts:now.getTime()});saveLogs();document.getElementById('logText').value='';document.getElementById('logMins').value='';updateHeader();renderLog()}
function renderLog(){const list=document.getElementById('logList');if(!logs.length){list.innerHTML=`<div class="empty-state">还没有记录 · 从今天开始吧</div>`;return}const sm=skillMap();list.innerHTML=logs.map(l=>`<div class="log-entry"><div class="log-entry-meta"><span>${l.date}</span>${l.skill?`<span class="log-skill-tag">${sm[l.skill]||l.skill}</span>`:''}${l.mins?`<span class="log-mins-tag">${l.mins}min</span>`:''}</div><div class="log-entry-text">${l.text}</div></div>`).join('')}
function switchTab(tab){const tabs=['overview','skills','timeline','log'];document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',tabs[i]===tab));document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id==='view-'+tab))}

setSyncBadge('加载中...');loadState().catch(()=>{loaded=true;setSyncBadge('本地模式');renderAll()});
</script>
